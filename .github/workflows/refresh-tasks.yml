name: Refresh tasks.json

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run fetch:tasks

      - name: Open PR if tasks.json changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(data): refresh tasks.json from wiki'
          branch: chore/refresh-tasks
          delete-branch: true
          title: 'chore(data): refresh tasks.json from wiki'
          body: |
            Automated weekly refresh from the OSRS wiki page
            `Demonic_Pacts_League/Tasks`. Review the diff to make sure
            no rows were dropped or fields renamed.
          add-paths: src/data/tasks.json
